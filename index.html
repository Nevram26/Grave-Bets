<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grave Bets</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <span class="stat health" id="healthDisplay">&#x2764;&#xFE0F; Health: 10</span>
      <span class="stat gold" id="goldDisplay">&#x1F4B0; Gold: 0</span>
      <span class="stat armor" id="armorDisplay" style="display:none">&#x1F6E1;&#xFE0F; Armor: 0</span>
    </div>

    <div id="relic-display"></div>

    <div id="zone-indicator">
      <span id="zoneLabel">CURRENT ZONE: LOADING...</span>
    </div>

    <div id="actionLog"></div>

    <div id="boss-ui" style="display:none">
      <div id="boss-name">&#x1F479; THE PITBOSS</div>
      <div id="boss-health-bg">
        <div id="boss-health-fill"></div>
      </div>
    </div>

    <div id="map-screen" style="display:none">
      <svg id="map-svg"></svg>
    </div>

    <div id="game-over-screen">
      <div class="overlay-panel game-over-panel">
        <h1>&#x1F480; GAME OVER</h1>
        <p>The house always wins...</p>
        <button class="play-again-btn" onclick="location.reload()">&#x1F3B0; Play Again</button>
      </div>
    </div>

    <div id="victory-screen">
      <div class="overlay-panel victory-panel">
        <h1>&#x1F451; YOU BROKE THE HOUSE</h1>
        <p>You defeated the Pitboss and escaped Grave Bets!</p>
        <button class="play-again-btn" onclick="location.reload()">&#x1F3B0; Play Again</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
